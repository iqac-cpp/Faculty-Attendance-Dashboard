<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Faculty Attendance Dashboard - GDC Cheepurupalli</title>
  <style>
    :root{--blue:#174a78;--blue2:#236ba4;--bg:#eaf3fb;--border:#d8e3ef;--text:#1f2937;--muted:#667085;--danger:#b42318;--success:#067647}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:17px;line-height:1.45}.page{max-width:780px;margin:0 auto;padding:14px}
    .hero{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;border-radius:20px;padding:22px 18px;margin:10px 0 14px;box-shadow:0 8px 22px rgba(23,74,120,.2)}.badge{display:inline-block;background:rgba(255,255,255,.18);padding:6px 10px;border-radius:999px;font-size:.78rem;font-weight:800;margin-bottom:10px}h1{margin:0;font-size:clamp(1.55rem,6vw,2.05rem)}
    .card,.field{background:white;border:1px solid var(--border);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 5px 16px rgba(16,24,40,.06)}label{display:block;font-weight:900;margin-bottom:8px}input,button{font:inherit}input{width:100%;min-height:52px;border:1px solid #cbd5e1;border-radius:14px;padding:13px 14px}.btn{width:100%;border:none;border-radius:15px;padding:14px 16px;font-weight:900;cursor:pointer;margin-top:10px}.btn-primary{background:var(--blue);color:white}.btn-secondary{background:white;color:var(--blue);border:1px solid var(--blue)}.btn-success{background:var(--success);color:white}
    .status{display:none;border-radius:16px;padding:14px;margin:14px 0;font-weight:800}.status.success{display:block;color:var(--success);background:#ecfdf3;border:1px solid #75e0a7}.status.error{display:block;color:var(--danger);background:#fef3f2;border:1px solid #fda29b}.hidden{display:none!important}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.info{border:1px solid #e5edf6;border-radius:14px;background:#f8fbff;padding:10px}.label{color:var(--muted);font-size:.82rem;font-weight:900;text-transform:uppercase}.value{font-size:1rem;font-weight:900;word-break:break-word;margin-top:4px}.count{font-size:2.4rem;color:var(--blue);font-weight:900;text-align:center;padding:12px}
    .qrbox{text-align:center}.qrbox img{width:230px;height:230px;border:1px solid var(--border);border-radius:14px;background:white;padding:8px}.linkbox{word-break:break-all;background:#f8fbff;border:1px solid #e5edf6;border-radius:14px;padding:12px;font-weight:700;color:#344054}
    @media(max-width:560px){body{font-size:18px}.page{padding:10px}.grid{grid-template-columns:1fr}.qrbox img{width:210px;height:210px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero"><div class="badge">GDC Cheepurupalli</div><h1>Faculty Attendance Dashboard</h1><p>Generate student attendance QR code, check count, and generate final PDF with signatures.</p></section>
    <div id="statusBox" class="status"></div>
    <section class="field">
      <label for="referenceNo">Activity Reference No</label>
      <input id="referenceNo" type="text" placeholder="Example: DA-2026-0005">
      <button id="loadActivityBtn" class="btn btn-primary" type="button">Load Activity</button>
    </section>
    <section id="dashboardPanel" class="card hidden">
      <div class="grid">
        <div class="info"><div class="label">Reference No</div><div class="value" id="refText"></div></div>
        <div class="info"><div class="label">Students Submitted</div><div class="count" id="countText">0</div></div>
        <div class="info"><div class="label">Activity</div><div class="value" id="activityText"></div></div>
        <div class="info"><div class="label">Department</div><div class="value" id="departmentText"></div></div>
        <div class="info"><div class="label">Date</div><div class="value" id="dateText"></div></div>
        <div class="info"><div class="label">Faculty Email</div><div class="value" id="emailText"></div></div>
      </div>
      <div class="card qrbox">
        <h2>Student Attendance QR Code</h2>
        <img id="qrImage" alt="Student Attendance QR Code">
        <div class="linkbox" id="attendanceLinkText"></div>
        <button id="copyLinkBtn" class="btn btn-secondary" type="button">Copy Attendance Link</button>
      </div>
      <button id="refreshCountBtn" class="btn btn-secondary" type="button">Refresh Student Count</button>
      <button id="generatePdfBtn" class="btn btn-success" type="button">Generate Final PDF with Attendance</button>
    </section>
  </main>
  <script>
    const ATTENDANCE_SCRIPT_URL = "PASTE_ATTENDANCE_APPS_SCRIPT_WEB_APP_URL_HERE";
    const STUDENT_FORM_URL = "PASTE_STUDENT_ATTENDANCE_GITHUB_PAGE_URL_HERE";

    const statusBox = document.getElementById("statusBox");
    const referenceNoInput = document.getElementById("referenceNo");
    const dashboardPanel = document.getElementById("dashboardPanel");
    let currentActivity = null;
    let currentAttendanceLink = "";

    function showStatus(type,msg){statusBox.className="status "+type;statusBox.textContent=msg;statusBox.scrollIntoView({behavior:"smooth",block:"start"});}
    function hideStatus(){statusBox.className="status";statusBox.textContent="";}

    function jsonp(action, params){
      return new Promise((resolve,reject)=>{
        if(ATTENDANCE_SCRIPT_URL.indexOf("PASTE_") === 0){reject(new Error("Apps Script URL is not configured."));return;}
        const callback = "cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
        params = params || {};
        params.action = action;
        params.callback = callback;
        const url = ATTENDANCE_SCRIPT_URL + "?" + new URLSearchParams(params).toString();
        const script = document.createElement("script");
        const timer = setTimeout(()=>{cleanup();reject(new Error("Request timed out."));}, 120000);
        window[callback] = function(data){cleanup();resolve(data);};
        function cleanup(){clearTimeout(timer);delete window[callback];script.remove();}
        script.onerror = function(){cleanup();reject(new Error("Request failed."));};
        script.src = url;
        document.body.appendChild(script);
      });
    }

    function buildAttendanceLink(data){
      if(STUDENT_FORM_URL.indexOf("PASTE_") === 0){return "";}
      const params = new URLSearchParams({
        ref: data.referenceNo || "",
        activity: data.activityName || "",
        department: data.department || "",
        date: data.activityDate || ""
      });
      return STUDENT_FORM_URL + "?" + params.toString();
    }

    function renderActivity(data){
      currentActivity = data;
      currentAttendanceLink = buildAttendanceLink(data);

      document.getElementById("refText").textContent = data.referenceNo || "";
      document.getElementById("activityText").textContent = data.activityName || "";
      document.getElementById("departmentText").textContent = data.department || "";
      document.getElementById("dateText").textContent = data.activityDate || "";
      document.getElementById("emailText").textContent = data.email || "";
      document.getElementById("countText").textContent = data.attendanceCount || 0;

      document.getElementById("attendanceLinkText").textContent = currentAttendanceLink || "Student form URL is not configured.";
      if(currentAttendanceLink){
        document.getElementById("qrImage").src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(currentAttendanceLink);
      }

      dashboardPanel.classList.remove("hidden");
    }

    document.getElementById("loadActivityBtn").addEventListener("click", async function(){
      hideStatus();
      const ref = referenceNoInput.value.trim();
      if(!ref){showStatus("error","Please enter Reference No.");return;}
      try{
        showStatus("success","Loading activity...");
        const data = await jsonp("getActivity", {referenceNo: ref});
        if(!data.success){throw new Error(data.message || "Activity not found.");}
        renderActivity(data);
        hideStatus();
      }catch(error){showStatus("error", error.message);}
    });

    document.getElementById("refreshCountBtn").addEventListener("click", async function(){
      if(!currentActivity){return;}
      try{
        showStatus("success","Refreshing count...");
        const data = await jsonp("getAttendanceCount", {referenceNo: currentActivity.referenceNo});
        if(!data.success){throw new Error(data.message || "Unable to refresh count.");}
        document.getElementById("countText").textContent = data.count || 0;
        hideStatus();
      }catch(error){showStatus("error", error.message);}
    });

    document.getElementById("copyLinkBtn").addEventListener("click", async function(){
      if(!currentAttendanceLink){showStatus("error","Attendance link is not available.");return;}
      try{
        await navigator.clipboard.writeText(currentAttendanceLink);
        showStatus("success","Attendance link copied. Share it with student groups.");
      }catch(error){
        showStatus("error","Could not copy automatically. Please copy the link manually.");
      }
    });

    document.getElementById("generatePdfBtn").addEventListener("click", async function(){
      if(!currentActivity){return;}
      const count = document.getElementById("countText").textContent;
      const ok = confirm(count + " students have submitted attendance. Generate final PDF now?");
      if(!ok){return;}
      try{
        showStatus("success","Generating final PDF. Please wait...");
        const data = await jsonp("generateFinalPdf", {referenceNo: currentActivity.referenceNo});
        if(!data.success){throw new Error(data.message || "PDF generation failed.");}
        showStatus("success","Final PDF generated and emailed successfully. Students included: " + data.attendanceCount);
      }catch(error){showStatus("error", error.message);}
    });

    window.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref") || params.get("referenceNo") || "";

      if (ref) {
        referenceNoInput.value = ref;
        setTimeout(function () {
          document.getElementById("loadActivityBtn").click();
        }, 300);
      }
    });

  </script>
</body>
</html>
